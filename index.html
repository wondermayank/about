<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://wondermayank.github.io/logo.svg" />
    <script>
      (function() {
        const faviconUrl = "https://wondermayank.github.io/logo.svg";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function() {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            
            // Draw circular clipping mask
            ctx.beginPath();
            ctx.arc(64, 64, 64, 0, Math.PI * 2);
            ctx.clip();
            
            // Draw the logo image
            ctx.drawImage(img, 0, 0, 128, 128);
            
            // Update the link element
            const link = document.querySelector("link[rel='icon']");
            if (link) {
              link.href = canvas.toDataURL("image/png");
            }
          } catch (e) {
            console.error("Error cropping favicon:", e);
          }
        };
        img.src = faviconUrl;
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wondermayank about</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
